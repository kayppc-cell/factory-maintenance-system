[theme]
primaryColor = "#2E7D32"         # สีปุ่มหลัก (ใช้สีเขียวเข้มมาตรฐานโรงงาน)
backgroundColor = "#F4F7F5"      # สีพื้นหลังหน้าเว็บ (สีเทาอมเขียวพาสเทล ซอฟต์สายตา 100%)
secondaryBackgroundColor = "#E8F5E9" # สีพื้นหลังคาร์ด/ตาราง/เมนูข้าง (สีเขียวอ่อนสบายตา)
textColor = "#1B5E20"            # สีตัวหนังสือหลัก
font = "sans serif"
