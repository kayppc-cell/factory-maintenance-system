[theme]
primaryColor = "#1565C0"         # สีปุ่มหลัก (น้ำเงินเข้มมาตรฐาน ดูเป็นมืออาชีพ)
backgroundColor = "#F0F4F8"      # สีพื้นหลังหน้าเว็บหลัก (ฟ้าอ่อนพาสเทล ละมุนตา ไม่สว่างจ้า)
secondaryBackgroundColor = "#E3F2FD" # สีกล่อง/เมนูข้าง/ปฏิทิน (ฟ้าซอฟต์บลู ดูสะอาดสะอ้าน)
textColor = "#0D47A1"            # สีตัวหนังสือหลัก (น้ำเงินเข้มเพื่อความคมชัด อ่านง่าย)
font = "sans serif"
